{% extends "base.html" %}

{% block title %}Удалить задачу{% endblock %}

{% block content %}
  <h1>Вы уверены, что хотите удалить задачу "{{ task.title }}"?</h1>
  <form method="post">
    {% csrf_token %}
    <button type="submit">Удалить</button>
  </form>
  <a href="{% url 'task_list' %}">Отменить</a>
{% endblock %}
