{% extends "base.html" %}

{% block title %}{{ task.title }}{% endblock %}

{% block content %}
  <h1>{{ task.title }}</h1>
  <p>{{ task.description }}</p>
  <p>Статус: {{ task.status.name }}</p>
  <p>Автор: {{ task.author.username }}</p>
  <p>Назначено: {{ task.assigned_to.username }}</p>
  <a href="{% url 'task_update' task.pk %}">Редактировать</a>
  <a href="{% url 'task_delete' task.pk %}">Удалить</a>
{% endblock %}
